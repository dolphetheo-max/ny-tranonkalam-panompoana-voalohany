<!DOCTYPE html>
<html>
<head>
    <style>
        /* Ny CSS rehetra dia ato anaty style */
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            background-color: #f4f4f4; 
        }

        /* Ny Navbar - "Flex" dia manampy amin'ny fandaminana */
        .navbar { 
            display: flex; 
            justify-content: space-between; 
            background-color: #333; 
            padding: 15px 20px; 
            color: white; 
        }

        /* Ny Sary - "Responsive" dia manaraka ny sakany */
        .sary-modely {
            width: 90%; 
            max-width: 400px;
            display: block;
            margin: 20px auto;
            border-radius: 15px;
        }

        /* Ny Box Model - Ny fototry ny endrika */
        .boaty-fanolorana {
            background: white;
            padding: 20px;
            margin: 20px auto;
            max-width: 350px;
            border-radius: 10px;
            border: 4px solid blue;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div>NyMarikako</div>
        <div>Menu</div>
    </nav>

    <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97" alt="Sary Informatika" class="sary-modely">
    
    <div class="boaty-fanolorana">
        <h1>Tongasoa!</h1>
        <p>Ity dia modely vita tsara nampiasana HTML sy CSS.</p>
    </div>

</body>
</html>
